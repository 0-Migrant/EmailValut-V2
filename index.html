<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vault — Business Manager</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>

  <!-- MOBILE SIDEBAR OVERLAY -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeMobileSidebar()"></div>

  <!-- MODALS -->
  <div id="confirm-modal" class="modal-bg" style="display:none">
    <div class="modal">
      <h3 id="confirm-title">Confirm</h3>
      <p id="confirm-msg">Are you sure?</p>
      <div class="modal-actions">
        <button class="btn btn-ghost btn-sm" onclick="closeConfirm()">Cancel</button>
        <button class="btn btn-danger btn-sm" id="confirm-ok">Confirm</button>
      </div>
    </div>
  </div>

  <div id="order-detail-modal" class="modal-bg" style="display:none">
    <div class="modal" id="order-detail-body"></div>
  </div>

  <!-- LOYALTY MODAL (Feature 3) -->
  <div id="loyalty-modal" class="modal-bg" style="display:none">
    <div class="modal loyalty-modal">
      <div class="loyalty-header">🎉</div>
      <h3 style="text-align:center;margin-bottom:8px">Special Offer Alert!</h3>
      <p style="text-align:center;color:var(--text-muted);margin-bottom:16px;font-size:14px">
        Customer <strong id="loyalty-customer"></strong> has reached
        <strong id="loyalty-order-num"></strong> purchases!<br>
        Consider giving them a special price on this order.
      </p>
      <div style="background:var(--green-bg);border:1px solid var(--green-border);border-radius:8px;padding:12px;margin-bottom:20px;text-align:center;font-size:13px;color:var(--green)">
        🏆 Loyal customer milestone reached! Reward them with a discount.
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost btn-sm" onclick="closeLoyaltyModal(true)">Skip & Continue</button>
        <button class="btn btn-success btn-sm" onclick="closeLoyaltyModal(true)">✓ Go to Orders</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="./assets/js/vault.js?v=3" defer></script>
</body>
</html>
