<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vault — Business Manager</title>
  <link rel="stylesheet" href="./assets/css/vault.css?v=3">
</head>
<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 17c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zM9 8V6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9z"/>
        </svg>
      </div>
      <span class="brand-name">Vault</span>
    </div>
    <div class="topbar-right">
      <button class="hamburger-btn" id="hamburger-btn" onclick="toggleMobileSidebar()" title="Menu">☰</button>
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle dark mode">🌙</button>
    </div>
  </div>

  <div class="app-shell">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-section">Dashboard</div>
      <button class="nav-item active" onclick="navigate('dashboard')"><span class="ni">📊</span>Overview</button>

      <div class="sidebar-section">Orders</div>
      <button class="nav-item" onclick="navigate('new-order')"><span class="ni">➕</span>New Order</button>
      <button class="nav-item" onclick="navigate('orders')"><span class="ni">📋</span>Manage Orders</button>
      <button class="nav-item" onclick="navigate('analytics')"><span class="ni">📈</span>Analytics</button>

      <div class="sidebar-section">Management</div>
      <button class="nav-item" onclick="navigate('items')"><span class="ni">🛒</span>Items</button>
      <button class="nav-item" onclick="navigate('delivery')"><span class="ni">🚚</span>Delivery Men</button>
      <button class="nav-item" onclick="navigate('credentials')"><span class="ni">🔒</span>Credentials</button>

      <div class="sidebar-section">System</div>
      <button class="nav-item" onclick="navigate('history')"><span class="ni">🕐</span>History</button>
      <button class="nav-item" onclick="navigate('settings')"><span class="ni">⚙️</span>Settings</button>
    </div>

    <!-- PAGE CONTENT -->
    <div class="page-content" id="page-content"></div>
  </div>

  <!-- MOBILE SIDEBAR OVERLAY -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeMobileSidebar()"></div>

  <!-- MODALS -->
  <div id="confirm-modal" class="modal-bg" style="display:none">
    <div class="modal">
      <h3 id="confirm-title">Confirm</h3>
      <p id="confirm-msg">Are you sure?</p>
      <div class="modal-actions">
        <button class="btn btn-ghost btn-sm" onclick="closeConfirm()">Cancel</button>
        <button class="btn btn-danger btn-sm" id="confirm-ok">Confirm</button>
      </div>
    </div>
  </div>

  <div id="order-detail-modal" class="modal-bg" style="display:none">
    <div class="modal" id="order-detail-body"></div>
  </div>

  <!-- LOYALTY MODAL (Feature 3) -->
  <div id="loyalty-modal" class="modal-bg" style="display:none">
    <div class="modal loyalty-modal">
      <div class="loyalty-header">🎉</div>
      <h3 style="text-align:center;margin-bottom:8px">Special Offer Alert!</h3>
      <p style="text-align:center;color:var(--text-muted);margin-bottom:16px;font-size:14px">
        Customer <strong id="loyalty-customer"></strong> has reached
        <strong id="loyalty-order-num"></strong> purchases!<br>
        Consider giving them a special price on this order.
      </p>
      <div style="background:var(--green-bg);border:1px solid var(--green-border);border-radius:8px;padding:12px;margin-bottom:20px;text-align:center;font-size:13px;color:var(--green)">
        🏆 Loyal customer milestone reached! Reward them with a discount.
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost btn-sm" onclick="closeLoyaltyModal(true)">Skip & Continue</button>
        <button class="btn btn-success btn-sm" onclick="closeLoyaltyModal(true)">✓ Go to Orders</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="./assets/js/vault.js?v=3" defer></script>
</body>
</html>
